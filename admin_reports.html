<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - EventLogic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .section { background: white; padding: 30px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h2 { color: #333; margin-bottom: 20px; }
        .report-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .stat-item { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 36px; font-weight: bold; }
        .stat-label { margin-top: 10px; opacity: 0.9; }
        .btn { background: #667eea; color: white; padding: 10px 16px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>EventLogic - Admin</h1>
        <div>
            <a href="/admin/vendors">Manage Vendors</a>
            <a href="/admin/disputes">Disputes</a>
            <a href="/admin/reports">Reports</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <h2>System Reports</h2>
            
            <div class="report-stats">
                <div class="stat-item">
                    <div class="stat-value">{{ total_bookings }}</div>
                    <div class="stat-label">Total Bookings</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${{ "%.2f" % total_revenue }}</div>
                    <div class="stat-label">Total Revenue</div>
                </div>
            </div>
        </div>
        
        <a href="/admin/dashboard" class="btn">Back to Dashboard</a>
    </div>
</body>
</html>
