<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - EventLogic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h2 { color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; }
        .btn { background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: 600; width: 100%; text-align: center; }
        .btn:hover { background: #764ba2; }
        .amount-display { background: #f9f9f9; padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .amount-display strong { color: #333; font-size: 24px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>EventLogic</h1>
        <div>
            <a href="/customer/events">My Events</a>
            <a href="/customer/budget">Budget Planner</a>
            <a href="/customer/vendors">Find Vendors</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
    
    <div class="container">
        <div class="section">
            <h2>Complete Payment</h2>
            
            {% if booking %}
                <div class="amount-display">
                    <p>Amount Due:</p>
                    <strong>${{ "%.2f" % (booking.payments[0].amount if booking.payments else 0) }}</strong>
                </div>
                
                <form method="POST">
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" name="card_number" placeholder="1234 5678 9012 3456" required>
                    </div>
                    
                    <div class="form-group">
                        <label>CVV</label>
                        <input type="text" name="cvv" placeholder="123" required>
                    </div>
                    
                    <button type="submit" class="btn">Pay Now</button>
                </form>
            {% else %}
                <p style="color: #999;">Booking not found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
