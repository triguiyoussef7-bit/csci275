<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service - EventLogic</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 40px; }
        .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
        .section { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .section h2 { color: #333; margin-bottom: 20px; }
        .btn { background: #667eea; color: white; padding: 12px 24px; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>EventLogic - Vendor</h1>
    </div>
    
    <div class="container">
        <div class="section">
            <h2>Edit Service</h2>
            
            {% if service %}
                <form method="POST">
                    <div class="form-group">
                        <label>Service Name</label>
                        <input type="text" name="service_name" value="{{ service.service_name }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category" required>
                            <option value="">Select category</option>
                            <option value="venue" {% if service.category == 'venue' %}selected{% endif %}>Venue</option>
                            <option value="catering" {% if service.category == 'catering' %}selected{% endif %}>Catering</option>
                            <option value="photography" {% if service.category == 'photography' %}selected{% endif %}>Photography</option>
                            <option value="decoration" {% if service.category == 'decoration' %}selected{% endif %}>Decoration</option>
                            <option value="music" {% if service.category == 'music' %}selected{% endif %}>Music/DJ</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" name="price" step="0.01" min="0" value="{{ service.price }}" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Description</label>
                        <textarea name="description" rows="4">{{ service.description or '' }}</textarea>
                    </div>
                    
                    <button type="submit" class="btn">Update Service</button>
                </form>
            {% else %}
                <p style="color: #999;">Service not found.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
