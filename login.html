<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventLogic</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .login-header p {
            color: #666;
            font-size: 14px;
        }
        
        .role-selector {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 25px;
        }
        
        .role-option {
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .role-option input[type="radio"] {
            display: none;
        }
        
        .role-option input[type="radio"]:checked + label {
            color: white;
        }
        
        .role-option input[type="radio"]:checked {
            display: none;
        }
        
        .role-option.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .role-option label {
            cursor: pointer;
            display: block;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .btn-submit {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .footer-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
        
        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        
        .footer-link a:hover {
            text-decoration: underline;
        }
        
        .demo-info {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
        }
        
        .demo-info strong {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>EventLogic</h1>
            <p>Sign In to Your Account</p>
        </div>
        
        <form method="POST" action="/login" id="loginForm">
            <div class="role-selector">
                <div class="role-option active" id="customerOption">
                    <input type="radio" id="customer" name="role" value="customer" required checked>
                    <label for="customer">👤 Customer</label>
                </div>
                <div class="role-option" id="vendorOption">
                    <input type="radio" id="vendor" name="role" value="vendor">
                    <label for="vendor">🏢 Vendor</label>
                </div>
                <div class="role-option" id="adminOption">
                    <input type="radio" id="admin" name="role" value="admin">
                    <label for="admin">⚙️ Admin</label>
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="user@example.com" autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn-submit">Sign In</button>
        </form>
        
        <div class="footer-link">
            Don't have an account? <a href="/register">Register here</a>
        </div>
        
        <div class="demo-info">
            <strong>Demo Accounts:</strong>
            <p>Admin: admin@eventlogic.com / admin123</p>
            <p>Customer: john@example.com / customer123</p>
            <p>Vendor: venue@eventlogic.com / vendor123</p>
        </div>
    </div>
    
    <script>
        // Handle role selection UI only
        document.querySelectorAll('input[name="role"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
                if (this.id === 'customer') document.getElementById('customerOption').classList.add('active');
                if (this.id === 'vendor') document.getElementById('vendorOption').classList.add('active');
                if (this.id === 'admin') document.getElementById('adminOption').classList.add('active');
            });
        });
    </script>
</body>
</html>
